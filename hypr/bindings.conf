# Application bindings
bindd = SUPER, RETURN, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER SHIFT, F, File manager, exec, uwsm-app -- nautilus --new-window
bindd = SUPER SHIFT, B, Browser, exec, uwsm-app -- google-chrome-stable --new-window --ozone-platform=wayland --disable-gpu-compositing --enable-features=UseOzonePlatform,TouchpadOverscrollHistoryNavigation,VaapiVideoDecoder,VaapiIgnoreDriverChecks --use-gl=angle --use-angle=gl --enable-zero-copy --enable-gpu-rasterization --ignore-gpu-blocklist
bindd = SUPER SHIFT ALT, B, Browser (private), exec, uwsm-app -- google-chrome-stable --new-window --private --ozone-platform=x11 --disable-gpu-compositing --enable-features=TouchpadOverscrollHistoryNavigation,VaapiVideoDecoder,VaapiIgnoreDriverChecks --use-gl=angle --use-angle=gl --enable-zero-copy --enable-gpu-rasterization --ignore-gpu-blocklist
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
# bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
# bindd = SUPER SHIFT, T, Activity, exec, omarchy-launch-tui btop
bindd = SUPER SHIFT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER SHIFT, G, Signal, exec, omarchy-launch-or-focus ^signal$ "uwsm-app -- signal-desktop"
# bindd = SUPER SHIFT, O, Obsidian, exec, omarchy-launch-or-focus ^obsidian$ "uwsm-app -- obsidian -disable-gpu --enable-wayland-ime"
# bindd = SUPER SHIFT, W, Typora, exec, uwsm-app -- typora --enable-wayland-ime
bindd = SUPER SHIFT, SLASH, Passwords, exec, uwsm-app -- 1password

# If your web app url contains #, type it as ## to prevent hyprland treating it as a comment
bindd = SUPER SHIFT CTRL, M, Google Meet, exec, uwsm-app -- google-chrome-stable --new-window --app="https://meet.google.com/" --ozone-platform=wayland --disable-gpu-compositing --enable-features=UseOzonePlatform,TouchpadOverscrollHistoryNavigation,VaapiVideoDecoder,VaapiIgnoreDriverChecks --use-gl=angle --use-angle=gl --enable-zero-copy --enable-gpu-rasterization --ignore-gpu-blocklist
bindd = SUPER SHIFT CTRL, C, Google Calendar, exec, omarchy-launch-or-focus-webapp "Google Calendar" "https://calendar.google.com/calendar/u/0/r/month"
bindd = SUPER SHIFT CTRL, E, Google Mail, exec, omarchy-launch-or-focus-webapp "Google Mail" "https://mail.google.com/"
# bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
# bindd = SUPER SHIFT ALT, A, Grok, exec, omarchy-launch-webapp "https://grok.com"
# bindd = SUPER SHIFT, E, Email, exec, omarchy-launch-webapp "https://app.hey.com"
# bindd = SUPER SHIFT, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
# bindd = SUPER SHIFT ALT, G, WhatsApp, exec, omarchy-launch-or-focus-webapp WhatsApp "https://web.whatsapp.com/"
# bindd = SUPER SHIFT, P, Google Photos, exec, omarchy-launch-or-focus-webapp "Google Photos" "https://photos.google.com/"
# bindd = SUPER SHIFT, X, X, exec, omarchy-launch-webapp "https://x.com/"
# bindd = SUPER SHIFT ALT, X, X Post, exec, omarchy-launch-webapp "https://x.com/compose/post"

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
# unbind = SUPER, SPACE
# bindd = SUPER, SPACE, Omarchy menu, exec, omarchy-menu

# Utilities
# ~/.local/share/omarchy/default/hypr/bindings/tiling-v2.conf
unbind = SUPER, K, Show key bindings, exec, omarchy-menu-keybindings
bindd = SUPER ALT, K, Show key bindings, exec, omarchy-menu-keybindings

# Tiling
# ~/.local/share/omarchy/default/hypr/bindings/tiling-v2.conf
bindd = SUPER, h, Move window focus left, movefocus, l
bindd = SUPER, j, Move window focus down, movefocus, d
bindd = SUPER, k, Move window focus up, movefocus, u
bindd = SUPER, l, Move window focus right, movefocus, r
bindd = SUPER ALT, l, Next window in group, changegroupactive, f
bindd = SUPER ALT, h, Previous window in group, changegroupactive, b
unbind = SUPER ALT, code:12, Switch to group window 3, changegroupactive, 3
unbind = SUPER ALT, code:13, Switch to group window 4, changegroupactive, 4
unbind = SUPER ALT, code:14, Switch to group window 5, changegroupactive, 5
unbind = SUPER ALT, mouse_down, Next window in group, changegroupactive, f
unbind = SUPER ALT, mouse_up, Previous window in group, changegroupactive, b
unbind = SUPER ALT, TAB, Next window in group, changegroupactive, f
unbind = SUPER ALT SHIFT, TAB, Previous window in group, changegroupactive, b

# Swap active window with the one next to it with SUPER + SHIFT + arrow keys
bindd = SUPER SHIFT, h, Swap window to the left, swapwindow, l
bindd = SUPER SHIFT, j, Swap window down, swapwindow, d
bindd = SUPER SHIFT, k, Swap window up, swapwindow, u
bindd = SUPER SHIFT, l, Swap window to the right, swapwindow, r

# Captures
# ~/.local/share/omarchy/default/hypr/bindings/utilities.conf
bindd = SUPER ALT, code:12, Screenshot to clipboard, exec, omarchy-cmd-screenshot smart clipboard
bindd = SUPER ALT, code:13, Screenshot with editing, exec, omarchy-cmd-screenshot
bindd = SUPER ALT, code:14, Screenrecording, exec, omarchy-menu screenrecord


